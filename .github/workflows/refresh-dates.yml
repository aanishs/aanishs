name: Refresh last-commit dates

on:
  schedule:
    - cron: "0 7 * * *"   # daily at 07:00 UTC
  workflow_dispatch:        # run on demand from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Update last-commit dates
        run: node scripts/refresh-dates.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- README.md; then
            git config user.name "readme-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "chore: refresh last-commit dates"
            git push
          else
            echo "No date changes."
          fi
